<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#b800ff"/>
    </linearGradient>
  </defs>
  <!-- Dark background rounded square -->
  <rect width="32" height="32" rx="7" fill="#050510"/>
  <!-- Bracket left -->
  <text x="3" y="23" font-family="monospace" font-size="15" font-weight="900" fill="url(#grad)">&lt;</text>
  <!-- Slash -->
  <text x="12" y="23" font-family="monospace" font-size="15" font-weight="900" fill="#ff6b35">/</text>
  <!-- Bracket right -->
  <text x="20" y="23" font-family="monospace" font-size="15" font-weight="900" fill="url(#grad)">&gt;</text>
</svg>
